<style>
:root {
  --void-base:#060610; --void-elevated:#0a0a1a; --void-panel:#0f2040;
  --gold:#C9A84C; --gold-light:#D4B563; --gold-dark:#B89A3F;
  --neuro-positive:#0D6E6E; --alert-red:#C62828; --molecule-orange:#F57C00;
  --text-primary:#E0E0E0; --text-secondary:#9CA3AF; --text-muted:#6B7280;
  --hairline:#1F2937;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--void-base);
       font-family: 'Inter','Segoe UI',Helvetica,Arial,sans-serif;
       color: var(--text-primary); font-weight: 300;
       line-height: 1.65; letter-spacing: 0.01em; }
.container { max-width: 900px; margin: 0 auto; padding: 24px; }
h2 { color: var(--gold); font-size: 1.4em; font-weight: 700;
     margin-bottom: 6px; letter-spacing: -0.3px; }
.subtitle { color: var(--text-secondary); font-size: .82em;
            margin-bottom: 16px; font-weight: 400; }
canvas { display: block; border-radius: 10px;
         border: 1px solid var(--hairline); background: var(--void-elevated); }
.ctrl { margin-top: 12px; display: flex; gap: 10px; flex-wrap: wrap; }
button { background: var(--void-panel); color: var(--text-primary);
         border: 1px solid var(--hairline); padding: 8px 18px;
         border-radius: 8px; cursor: pointer; font-family: inherit;
         font-size: .85em; font-weight: 500; transition: all .2s ease; }
button:hover { background: var(--void-elevated); border-color: var(--gold);
               color: var(--gold); transform: translateY(-1px); }
.metrics { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
           gap: 10px; margin-top: 16px; }
.metric { background: var(--void-panel); border: 1px solid var(--hairline);
          border-radius: 10px; padding: 14px; text-align: center; }
.metric-val { color: var(--gold); font-size: 1.5em; font-weight: 800;
              letter-spacing: -0.4px; line-height: 1.1; }
.metric-lbl { color: var(--text-muted); font-size: .68em; margin-top: 5px;
              text-transform: uppercase; letter-spacing: 1.5px; font-weight: 500; }
.progress { width: 100%; height: 6px; background: var(--hairline);
            border-radius: 3px; margin-top: 10px; overflow: hidden; }
.progress-bar { height: 6px; background: linear-gradient(90deg,var(--gold-dark),var(--gold),var(--gold-light));
                border-radius: 3px; transition: width .05s; }
</style>

</head>
<body>
<div class="container">
  <h2>CEREBRO-X | V02 — PBPK Digital Twin | Donepezil</h2>
  <p class="subtitle">6-compartment ODE simulation | Kp,brain=1.45622 | Cmax_brain=0.45050 µg/mL</p>
  <canvas id="c02" width="860" height="340"></canvas>
  <div class="progress"><div class="progress-bar" id="progressBar" style="width:0%"></div></div>
  <div class="ctrl">
    <button onclick="anim.toggle()" id="playBtn">▶ Play</button>
    <button onclick="anim.reset()">↺ Reset</button>
    <button onclick="anim.step()">⏭ Step +1%</button>
  </div>
  <div class="metrics">
  <div class="metric"><div class="metric-val">0.45050</div><div class="metric-lbl">Cmax brain (µg/mL)</div></div>
  <div class="metric"><div class="metric-val">72.0h</div><div class="metric-lbl">t_max brain</div></div>

</div>

const series={
  Plasma:    {data:[0.25, 0.24277, 0.23577, 0.23094, 0.22762, 0.22583, 0.22413, 0.223, 0.22227, 0.22184, 0.22167, 0.22158, 0.22163, 0.22178, 0.22195, 0.22225, 0.2226, 0.22301, 0.22347, 0.22385, 0.22438, 0.22496, 0.22557, 0.22621, 0.22671, 0.22741, 0.22814, 0.2289, 0.22949, 0.2303, 0.23113, 0.23199, 0.23287, 0.23355, 0.23447, 0.23542, 0.23638, 0.23737, 0.23812, 0.23915, 0.24019, 0.24125, 0.24206, 0.24315, 0.24426, 0.24539, 0.24653, 0.2474, 0.24857, 0.24976, 0.25096, 0.25218, 0.2531, 0.25434, 0.2556, 0.25687, 0.25783, 0.25913, 0.26044, 0.26176, 0.26309, 0.2641, 0.26545, 0.26682, 0.2682, 0.26959, 0.27065, 0.27206, 0.27348, 0.27492, 0.27601, 0.27746, 0.27893, 0.28041, 0.2819, 0.28302, 0.28453, 0.28605, 0.28758, 0.28912], color:'#F57C00'},
  'Brain ISF':{data:[0.0, 0.07272, 0.14473, 0.19469, 0.22954, 0.24867, 0.26756, 0.2811, 0.29097, 0.29831, 0.30265, 0.30734, 0.31114, 0.31433, 0.31645, 0.319, 0.32134, 0.32354, 0.32564, 0.32718, 0.32918, 0.33116, 0.33312, 0.33507, 0.33652, 0.33847, 0.34041, 0.34236, 0.34383, 0.34578, 0.34775, 0.34972, 0.3517, 0.35319, 0.35519, 0.35719, 0.35921, 0.36123, 0.36275, 0.36479, 0.36684, 0.3689, 0.37045, 0.37252, 0.37461, 0.37671, 0.37881, 0.3804, 0.38253, 0.38466, 0.38681, 0.38897, 0.39059, 0.39277, 0.39496, 0.39716, 0.39881, 0.40103, 0.40326, 0.40551, 0.40776, 0.40946, 0.41173, 0.41402, 0.41632, 0.41863, 0.42037, 0.42271, 0.42505, 0.42741, 0.42919, 0.43157, 0.43396, 0.43637, 0.43879, 0.44061, 0.44305, 0.44551, 0.44798, 0.45046], color:'#C9A84C'},
  CSF:       {data:[0.0, 0.01406, 0.06665, 0.14183, 0.22785, 0.29486, 0.38362, 0.46896, 0.54916, 0.62337, 0.67494, 0.73827, 0.79566, 0.8475, 0.883, 0.92624, 0.9652, 1.00035, 1.03211, 1.05395, 1.08069, 1.10503, 1.12725, 1.14762, 1.16182, 1.17949, 1.19587, 1.21113, 1.22193, 1.23557, 1.24845, 1.26065, 1.27228, 1.28067, 1.29147, 1.30187, 1.31195, 1.32173, 1.3289, 1.33827, 1.34746, 1.35649, 1.36317, 1.37197, 1.38068, 1.3893, 1.39786, 1.40425, 1.41273, 1.42117, 1.42959, 1.438, 1.4443, 1.45269, 1.46109, 1.4695, 1.47581, 1.48424, 1.49269, 1.50117, 1.50967, 1.51606, 1.52461, 1.53319, 1.5418, 1.55045, 1.55696, 1.56568, 1.57443, 1.58322, 1.58984, 1.59871, 1.60762, 1.61657, 1.62557, 1.63235, 1.64143, 1.65055, 1.65972, 1.66894],color:'#7C4DFF'},
  'Brain Cell':{data:[0.0, 0.00133, 0.0065, 0.01425, 0.02361, 0.03127, 0.04197, 0.05291, 0.06389, 0.07475, 0.08276, 0.09321, 0.10337, 0.11322, 0.12039, 0.12967, 0.13863, 0.14727, 0.15561, 0.16167, 0.1695, 0.17706, 0.18435, 0.19139, 0.19651, 0.20314, 0.20955, 0.21575, 0.22027, 0.22612, 0.2318, 0.2373, 0.24263, 0.24653, 0.25159, 0.25651, 0.26129, 0.26594, 0.26935, 0.27379, 0.27812, 0.28234, 0.28543, 0.28948, 0.29343, 0.2973, 0.30108, 0.30387, 0.30752, 0.3111, 0.31461, 0.31805, 0.3206, 0.32394, 0.32723, 0.33046, 0.33286, 0.33601, 0.33912, 0.34219, 0.34522, 0.34747, 0.35044, 0.35338, 0.35628, 0.35916, 0.3613, 0.36413, 0.36694, 0.36973, 0.37181, 0.37456, 0.3773, 0.38002, 0.38273, 0.38475, 0.38743, 0.39011, 0.39277, 0.39542],color:'#0D6E6E'},
  Peripheral:{data:[0.0, 1e-05, 3e-05, 5e-05, 7e-05, 8e-05, 9e-05, 0.00011, 0.00013, 0.00014, 0.00016, 0.00017, 0.00019, 0.0002, 0.00022, 0.00023, 0.00025, 0.00027, 0.00028, 0.0003, 0.00031, 0.00033, 0.00034, 0.00036, 0.00037, 0.00039, 0.00041, 0.00042, 0.00044, 0.00045, 0.00047, 0.00049, 0.0005, 0.00052, 0.00053, 0.00055, 0.00057, 0.00059, 0.0006, 0.00062, 0.00064, 0.00065, 0.00067, 0.00068, 0.0007, 0.00072, 0.00074, 0.00075, 0.00077, 0.00079, 0.00081, 0.00083, 0.00084, 0.00086, 0.00088, 0.0009, 0.00091, 0.00093, 0.00095, 0.00097, 0.00099, 0.001, 0.00102, 0.00104, 0.00106, 0.00108, 0.00109, 0.00111, 0.00113, 0.00115, 0.00117, 0.00119, 0.00121, 0.00123, 0.00125, 0.00127, 0.00129, 0.00131, 0.00133, 0.00135],color:'#C62828'},
};
const maxC=Math.max(...Object.values(series).flatMap(s=>s.data))*1.15||0.01;
const W2=C2.width,H2=C2.height,PAD={t:20,r:120,b:40,l:70};
const plotW=W2-PAD.l-PAD.r,plotH=H2-PAD.t-PAD.b;
const scX=i=>PAD.l+i/tArr.length*plotW;
const scY=v=>PAD.t+plotH-(v/maxC)*plotH;

const anim2=(function(){
  let t=0,playing=false,raf=null;
  function draw(progress){
    X2.fillStyle='#0a0a1a';X2.fillRect(0,0,W2,H2);
    // Grid
    X2.strokeStyle='#1F2937';X2.lineWidth=0.5;
    for(let i=0;i<=5;i++){
      const y=PAD.t+i*plotH/5;
      X2.beginPath();X2.moveTo(PAD.l,y);X2.lineTo(W2-PAD.r,y);X2.stroke();
      const v=(maxC*(1-i/5)).toFixed(5);
      X2.fillStyle='#888';X2.font='9px monospace';X2.textAlign='right';
      X2.fillText(v,PAD.l-4,y+3);
    }
    for(let i=0;i<=8;i++){
      const x=PAD.l+i*plotW/8;
      X2.beginPath();X2.moveTo(x,PAD.t);X2.lineTo(x,H2-PAD.b);X2.stroke();
      const tv=Math.round(tArr[Math.floor(i*(tArr.length-1)/8)]);
      X2.fillStyle='#888';X2.textAlign='center';
      X2.fillText(tv+'h',x,H2-PAD.b+14);
    }
    // Axes labels
    X2.fillStyle='#C9A84C';X2.font='10px monospace';X2.textAlign='center';
    X2.fillText('Time (h)',W2/2,H2-4);
    X2.save();X2.translate(14,H2/2);X2.rotate(-Math.PI/2);
    X2.fillText('Concentration (µg/mL)',0,0);X2.restore();

    // Series
    const nPts=Math.floor(progress*tArr.length);
    let li=0;
    Object.entries(series).forEach(([name,{data,color}])=>{
      if(nPts<2)return;
      X2.beginPath();
      X2.moveTo(scX(0),scY(data[0]));
      for(let i=1;i<nPts;i++) X2.lineTo(scX(i),scY(data[i]));
      X2.strokeStyle=color;X2.lineWidth=2;X2.stroke();
      // Legend
      X2.fillStyle=color;X2.fillRect(W2-PAD.r+8,PAD.t+li*18,12,3);
      X2.fillStyle='#E0E0E0';X2.font='9px monospace';X2.textAlign='left';
      X2.fillText(name,W2-PAD.r+24,PAD.t+li*18+4);
      li++;
    });
    document.getElementById('progressBar').style.width=(progress*100)+'%';
  }
  function loop(){
    if(!playing)return;
    t=Math.min(1,t+0.006);draw(t);
    if(t>=1){playing=false;document.getElementById('playBtn').textContent='↺ Replay';return;}
    raf=requestAnimationFrame(loop);
  }
  return{
    toggle(){if(t>=1)t=0;playing=!playing;
      document.getElementById('playBtn').textContent=playing?'⏸ Pause':'▶ Play';if(playing)loop();},
    reset(){t=0;playing=false;draw(0);document.getElementById('playBtn').textContent='▶ Play';},
    step(){t=Math.min(1,t+0.02);draw(t);},
  };
})();
anim2.reset();

</script>
</body>
